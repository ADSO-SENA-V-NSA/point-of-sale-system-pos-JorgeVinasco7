<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form in HTML and CSS</title>
    <link rel="stylesheet" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <div class="wapper">
        <form method="post" action="php/conexionDB.php">
            <h1>Register</h1>
            <div class="input-box">
                <input type="text" name="txtEmail" placeholder="Email" required>
                <i class='bx bxs-user'></i>
            </div>
            <div class="input-box">
                <input type="text" name="txtPassword" placeholder="Password" required>
                <i class='bx bxs-envelope'></i>
            </div>
            <div class="input-box">
                <input type="password" name="conf_password" placeholder="Confirme Password" required>
                <i class='bx bxs-lock-alt'></i>
            </div>
            <div class="remember-forgot">
                <label><input type="checkbox">I agree to the teams & conditions</label>
            </div>
            <button type="submit" class="btn">Register</button>
            <div class="register-list">
                <p>Already have an Account? <a href="login.html">Login</a></p>
            </div>
        </form>
    </div>
</body>

</html>
